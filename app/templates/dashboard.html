<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>iSida · Moderation Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #1e1f22 0%, #0f1012 100%);
            color: #ecedee;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2b2d31; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #5865f2; border-radius: 10px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 20px; margin-bottom: 48px;
            padding-bottom: 16px; border-bottom: 1px solid rgba(88,101,242,0.25);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 32px; color: #5865f2; filter: drop-shadow(0 0 6px rgba(88,101,242,0.5)); }
        .logo-text { font-size: 26px; font-weight: 700; background: linear-gradient(135deg, #FFF, #B5BAC1); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.5px; }
        .logo-text span { background: linear-gradient(135deg, #5865f2, #8ea1e1); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .user-menu { position: relative; cursor: pointer; }
        .user-trigger {
            display: flex; align-items: center; gap: 12px;
            background: rgba(43,45,49,0.9); backdrop-filter: blur(8px);
            padding: 8px 16px 8px 12px; border-radius: 60px;
            border: 1px solid rgba(88,101,242,0.3);
        }
        .user-trigger:hover { background: #3b3f48; border-color: #5865f2; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #5865f2; }
        .user-name { font-weight: 500; font-size: 14px; }
        .dropdown-arrow { font-size: 12px; color: #b5bac1; }
        .dropdown-menu {
            position: absolute; top: 55px; right: 0; background: #2b2d31;
            backdrop-filter: blur(12px); border-radius: 16px; width: 180px;
            opacity: 0; visibility: hidden; transform: translateY(-10px);
            transition: 0.2s; box-shadow: 0 12px 28px rgba(0,0,0,0.4);
            border: 1px solid rgba(88,101,242,0.3); z-index: 100;
        }
        .user-menu:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 18px;
            color: #dbdee1; text-decoration: none; font-size: 14px;
        }
        .dropdown-item:hover { background: #3b3f48; color: white; }
        .dropdown-item i { width: 20px; color: #5865f2; }
        .page-title { margin-bottom: 32px; }
        .page-title h1 { font-size: 32px; font-weight: 600; }
        .page-title p { color: #b5bac1; margin-top: 8px; }
        .stats-banner {
            background: linear-gradient(135deg, #23252b, #1e1f22);
            border-radius: 24px; padding: 20px 28px; margin-bottom: 40px;
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 20px;
            border: 1px solid rgba(88,101,242,0.2);
        }
        .stat-card { display: flex; align-items: center; gap: 16px; }
        .stat-icon { font-size: 32px; color: #5865f2; }
        .stat-info h3 { font-size: 28px; font-weight: 700; }
        .stat-info p { font-size: 13px; color: #b5bac1; }
        .servers-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px; margin-top: 16px;
        }
        .server-card {
            background: rgba(43,45,49,0.7); backdrop-filter: blur(4px);
            border-radius: 24px; padding: 24px; transition: all 0.25s;
            border: 1px solid rgba(88,101,242,0.1); cursor: pointer;
            position: relative; overflow: hidden;
        }
        .server-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 4px; background: linear-gradient(90deg, #5865f2, #8ea1e1);
            transform: scaleX(0); transition: transform 0.3s;
        }
        .server-card:hover { transform: translateY(-6px); background: #32353b; border-color: rgba(88,101,242,0.4); }
        .server-card:hover::before { transform: scaleX(1); }
        .server-icon { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 20px; border: 3px solid #5865f2; }
        .server-name { font-size: 20px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .badge { font-size: 11px; padding: 4px 10px; border-radius: 30px; background: #5865f2; color: white; font-weight: 500; }
        .badge.owner { background: #faa81a; color: #1e1f22; }
        .server-actions { margin-top: 20px; display: flex; gap: 12px; }
        .btn { padding: 8px 16px; border-radius: 40px; font-size: 13px; font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: #5865f2; color: white; border: none; }
        .btn-primary:hover { background: #4752c4; transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1px solid #5865f2; color: #5865f2; }
        .btn-outline:hover { background: rgba(88,101,242,0.1); }
        .loading-state, .empty-state { text-align: center; padding: 80px 20px; background: rgba(43,45,49,0.5); border-radius: 32px; margin-top: 40px; }
        .loading-spinner { width: 48px; height: 48px; border: 4px solid #2b2d31; border-top: 4px solid #5865f2; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { margin-top: 60px; text-align: center; font-size: 13px; color: #5c5f66; border-top: 1px solid rgba(88,101,242,0.15); padding-top: 24px; }
        @media (max-width: 700px) { .container { padding: 16px; } .stats-banner { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo-area"><i class="fas fa-robot logo-icon"></i><div class="logo-text"><span>iSida</span> Dashboard</div></div>
            <div class="user-menu">
                <div class="user-trigger"><img id="userAvatar" class="user-avatar"><span id="userName" class="user-name">Loading...</span><i class="fas fa-chevron-down dropdown-arrow"></i></div>
                <div class="dropdown-menu"><a href="#" id="logoutBtn" class="dropdown-item"><i class="fas fa-sign-out-alt"></i> Logout</a></div>
            </div>
        </div>
        <div class="page-title"><h1>Moderation Hub</h1><p>Manage warnings, logs, and server settings across your servers.</p></div>
        <div class="stats-banner" id="statsBanner">
            <div class="stat-card"><i class="fas fa-server stat-icon"></i><div class="stat-info"><h3 id="serverCount">0</h3><p>Available Servers</p></div></div>
            <div class="stat-card"><i class="fas fa-shield-alt stat-icon"></i><div class="stat-info"><h3 id="adminCount">0</h3><p>Admin/Owner Guilds</p></div></div>
        </div>
        <div id="guildsContainer" class="loading-state"><div class="loading-spinner"></div><p>Fetching your secured servers...</p></div>
        <div class="footer"><i class="fas fa-lock"></i> Secure connection · <i class="fab fa-discord"></i> iSida Moderation Bot</div>
    </div>
    <script>
        async function fetchGuilds() {
            try {
                const response = await fetch('/api/guilds/');
                if (!response.ok) { if (response.status === 401) window.location.href = '/auth/login'; throw new Error(); }
                const guilds = await response.json();
                renderDashboard(guilds);
            } catch(err) {
                document.getElementById('guildsContainer').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="font-size:48px;color:#f23f42;"></i><p>Could not load servers. <a href="/auth/login" style="color:#5865f2;">Login again</a>.</p></div>`;
            }
        }
        function renderDashboard(guilds) {
            const container = document.getElementById('guildsContainer');
            document.getElementById('serverCount').innerText = guilds.length;
            const ownerCount = guilds.filter(g => g.owner === true).length;
            document.getElementById('adminCount').innerText = `${ownerCount} Owner, ${guilds.length - ownerCount} Admin`;
            if (!guilds.length) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-frown" style="font-size:48px;color:#b5bac1;"></i><h3>No servers available</h3><p>Invite iSida bot to your server and ensure you have <strong>Administrator</strong> or <strong>Owner</strong> permissions.</p></div>`;
                return;
            }
            const cardsHtml = guilds.map(g => {
                const iconUrl = g.icon ? `https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png?size=128` : 'https://cdn.discordapp.com/embed/avatars/0.png';
                const ownerBadge = g.owner ? '<span class="badge owner"><i class="fas fa-crown"></i> Owner</span>' : '<span class="badge"><i class="fas fa-shield-alt"></i> Admin</span>';
                return `<div class="server-card"><img class="server-icon" src="${iconUrl}" loading="lazy"><div class="server-name">${escapeHtml(g.name)} ${ownerBadge}</div><div class="server-actions"><a href="/warnings/${g.id}" class="btn btn-primary"><i class="fas fa-exclamation-triangle"></i> Warnings</a><a href="/logs/${g.id}" class="btn btn-outline"><i class="fas fa-history"></i> Mod Logs</a></div></div>`;
            }).join('');
            container.innerHTML = `<div class="servers-grid">${cardsHtml}</div>`;
        }
        function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
        async function loadUserInfo() {
            try {
                const res = await fetch('/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('userName').innerText = `${user.username}#${user.discriminator || '0'}`;
                    const avatarUrl = user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=64` : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.discriminator || '0') % 5}.png`;
                    document.getElementById('userAvatar').src = avatarUrl;
                }
            } catch(e) {}
        }
        function logout() { fetch('/auth/logout', { method: 'POST' }).then(() => window.location.href = '/'); }
        document.getElementById('logoutBtn')?.addEventListener('click', (e) => { e.preventDefault(); logout(); });
        loadUserInfo(); fetchGuilds();
    </script>
</body>
</html>
