<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSida Dashboard - Mod Logs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #1e1f22; color: #dbdee1; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #2b2d31; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header h1 span { color: #5865f2; }
        .back-btn { background: #2b2d31; color: #dbdee1; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; transition: background 0.2s; }
        .back-btn:hover { background: #3b3f48; }
        .guild-info { background: #2b2d31; border-radius: 12px; padding: 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .guild-icon { width: 64px; height: 64px; border-radius: 50%; background: #1e1f22; object-fit: cover; }
        .guild-name { font-size: 20px; font-weight: 600; color: #ffffff; }
        .stats { margin-left: auto; background: #1e1f22; padding: 8px 16px; border-radius: 20px; font-size: 14px; }
        .table-container { background: #2b2d31; border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px; background: #1e1f22; font-weight: 600; color: #b5bac1; border-bottom: 1px solid #3b3f48; }
        td { padding: 14px 16px; border-bottom: 1px solid #3b3f48; vertical-align: top; }
        tr:hover { background: #32353b; }
        .action-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .action-ban { background: #da373c; color: white; }
        .action-kick { background: #faa81a; color: #1e1f22; }
        .action-warn { background: #5865f2; color: white; }
        .action-other { background: #4b4e57; color: white; }
        .timestamp { font-size: 12px; color: #b5bac1; white-space: nowrap; }
        .no-data { text-align: center; padding: 48px; color: #b5bac1; }
        .footer { margin-top: 24px; text-align: center; font-size: 12px; color: #5c5f66; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1><span>iSida</span> Dashboard</h1><a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Servers</a></div>
        <div class="guild-info" id="guildInfo"><img id="guildIcon" class="guild-icon"><div><div class="guild-name" id="guildName">Loading...</div><div class="guild-id" id="guildId" style="font-size:12px;color:#b5bac1;"></div></div><div class="stats" id="logCount">0 entries</div></div>
        <div class="table-container"><table><thead><tr><th>Action</th><th>Moderator</th><th>Target</th><th>Reason</th><th>Date</th></tr></thead><tbody id="logsBody"><tr class="no-data"><td colspan="5">Loading moderation logs...</td></tr></tbody></table></div>
        <div class="footer">iSida Moderation Logs | All moderation actions are recorded here</div>
    </div>
    <script>
        const guildId = window.location.pathname.split('/').pop();
        async function fetchLogs() {
            try {
                const guildRes = await fetch('/api/guilds/');
                const guilds = await guildRes.json();
                const guild = guilds.find(g => g.id === guildId);
                if (guild) {
                    document.getElementById('guildName').innerText = guild.name;
                    document.getElementById('guildId').innerText = `ID: ${guild.id}`;
                    const iconUrl = guild.icon ? `https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png` : 'https://cdn.discordapp.com/embed/avatars/0.png';
                    document.getElementById('guildIcon').src = iconUrl;
                }
                const logsRes = await fetch(`/api/logs/${guildId}?limit=100`);
                if (!logsRes.ok) throw new Error();
                const logs = await logsRes.json();
                document.getElementById('logCount').innerText = `${logs.length} entry${logs.length !== 1 ? 's' : ''}`;
                const tbody = document.getElementById('logsBody');
                if (logs.length === 0) { tbody.innerHTML = '<tr class="no-data"><td colspan="5">No moderation logs found for this server.</td></tr>'; return; }
                const actionClass = (action) => {
                    if (action.includes('Ban')) return 'action-ban';
                    if (action.includes('Kick')) return 'action-kick';
                    if (action.includes('Warn')) return 'action-warn';
                    return 'action-other';
                };
                tbody.innerHTML = logs.map(log => `<tr><td><span class="action-badge ${actionClass(log.action)}">${log.action}</span></td><td>${log.moderator_id || 'Unknown'}</td><td>${log.target_id || 'N/A'}</td><td class="reason">${escapeHtml(log.reason || 'No reason')}</td><td class="timestamp">${formatDate(log.timestamp)}</td></tr>`).join('');
            } catch(e) { document.getElementById('logsBody').innerHTML = '<tr class="no-data"><td colspan="5">Error loading logs.</td></tr>'; }
        }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function formatDate(isoString) { if (!isoString) return 'Unknown'; const d = new Date(isoString); return d.toLocaleString(); }
        fetchLogs();
    </script>
</body>
</html>
